name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: Web-Paste_windows_x64.exe
            binary_name: Web Paste.exe
            binary_subdir: release
          - name: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_name: Web-Paste_windows_arm64.exe
            binary_name: Web Paste.exe
            binary_subdir: release
          - name: macos-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            artifact_name: Web-Paste_macos_x64
            binary_name: Web Paste
            binary_subdir: release
          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            artifact_name: Web-Paste_macos_arm64
            binary_name: Web Paste
            binary_subdir: release
          - name: linux-x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: Web-Paste_linux_x64
            binary_name: web-paste-desktop
            binary_subdir: release
          - name: linux-arm64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: Web-Paste_linux_arm64
            binary_name: web-paste-desktop
            binary_subdir: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri binary
        run: npm run tauri:build -- --target ${{ matrix.target }} --bundles none

      - name: Collect executable
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          binary=""
          for candidate in \
            "src-tauri/target/${{ matrix.target }}/${{ matrix.binary_subdir }}/${{ matrix.binary_name }}" \
            "src-tauri/target/${{ matrix.binary_subdir }}/${{ matrix.binary_name }}"
          do
            if [ -f "$candidate" ]; then
              binary="$candidate"
              break
            fi
          done

          if [ -z "$binary" ]; then
            echo "Executable not found. Built files under src-tauri/target:"
            find src-tauri/target -maxdepth 4 -type f | sort
            exit 1
          fi

          cp "$binary" "release-assets/${{ matrix.artifact_name }}"
          chmod +x "release-assets/${{ matrix.artifact_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: release-assets/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
